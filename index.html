<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八字专业匹配 · 高考志愿填报助手</title>
<style>
:root {
  --gold: #C9A96E; --gold-light: #E8D5B7; --wood: #7BA87F; --fire: #D4786E;
  --earth: #C4A45A; --metal: #B8C5C8; --water: #6B9EBF;
  --bg: #1a1a1a; --card: #252525; --card2: #2d2d2d;
  --text: #e0d5c0; --text2: #a09080; --border: #3a3530;
  --radius: 12px; --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.7; }
.container { max-width:960px; margin:0 auto; padding:20px; }

.header { text-align:center; padding:40px 20px 30px; border-bottom:1px solid var(--border); margin-bottom:30px; position:relative; overflow:hidden; }
.header::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle at 30% 50%, rgba(201,169,110,0.06) 0%, transparent 50%), radial-gradient(circle at 70% 50%, rgba(107,158,191,0.04) 0%, transparent 50%); pointer-events:none; }
.header h1 { font-size:2rem; background:linear-gradient(135deg, var(--gold), var(--gold-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; position:relative; z-index:1; }
.header .subtitle { color:var(--text2); font-size:0.95rem; position:relative; z-index:1; display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap; }
.header .badge { display:inline-block; padding:2px 10px; border-radius:999px; font-size:0.75rem; background:rgba(201,169,110,0.15); color:var(--gold); }

.card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:20px; box-shadow:var(--shadow); }
.card h2 { font-size:1.15rem; margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.card h2 .icon { font-size:1.3rem; }
.card h3 { font-size:1rem; margin:16px 0 10px; color:var(--gold-light); }

/* Form */
.form-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(170px, 1fr)); gap:12px; margin-bottom:10px; }
.form-group { display:flex; flex-direction:column; }
.form-group label { font-size:0.82rem; color:var(--text2); margin-bottom:5px; font-weight:500; }
.form-group input, .form-group select { background:var(--card2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--text); font-size:0.92rem; font-family:inherit; transition:border-color 0.2s; }
.form-group input:focus, .form-group select:focus { outline:none; border-color:var(--gold); }
.form-group select option { background:var(--card2); color:var(--text); }

.btn { width:100%; padding:12px; border:none; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.2s; margin-top:6px; }
.btn-primary { background:linear-gradient(135deg, #B8935A, #D4AF37); color:#1a1a1a; }
.btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); }
.btn-secondary { background:var(--card2); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { background:#383838; }
.btn-small { width:auto; padding:6px 14px; font-size:0.82rem; display:inline-flex; align-items:center; gap:4px; }

/* Tags */
.tag { display:inline-block; padding:2px 8px; border-radius:999px; font-size:0.78rem; font-weight:500; }
.tg-gold { background:rgba(201,169,110,0.2); color:var(--gold); }
.tg-wood { background:rgba(123,168,127,0.2); color:var(--wood); }
.tg-fire { background:rgba(212,120,110,0.2); color:var(--fire); }
.tg-earth { background:rgba(196,164,90,0.2); color:var(--earth); }
.tg-water { background:rgba(107,158,191,0.2); color:var(--water); }
.tg-metal { background:rgba(184,197,200,0.2); color:var(--metal); }

/* Pillars */
.pillars { display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; margin:12px 0; }
.pillar { background:var(--card2); border-radius:10px; padding:16px 8px; text-align:center; border:2px solid var(--border); transition:all 0.3s; }
.pillar:hover { transform:translateY(-2px); }
.pillar-label { font-size:0.72rem; color:var(--text2); margin-bottom:6px; }
.pillar-stem { font-size:1.5rem; font-weight:700; }
.pillar-branch { font-size:0.85rem; color:var(--text2); margin-top:2px; }
.pillar-hidden { font-size:0.68rem; color:#666; margin-top:2px; }

/* Analysis grid */
.analysis-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:8px; margin:12px 0; }
.analysis-item { background:var(--card2); border-radius:8px; padding:12px; text-align:center; }
.analysis-item .label { font-size:0.78rem; color:var(--text2); }
.analysis-item .value { font-size:1.05rem; font-weight:600; margin-top:4px; }

/* Wuxing bars */
.wuxing-bars { margin:12px 0; }
.wx-row { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
.wx-label { width:20px; font-size:0.82rem; text-align:center; }
.wx-bar { flex:1; height:10px; background:var(--card2); border-radius:5px; overflow:hidden; }
.wx-fill { height:100%; border-radius:5px; transition:width 0.8s ease; }
.f-gold { background:linear-gradient(90deg, var(--gold), var(--gold-light)); }
.f-wood { background:linear-gradient(90deg, #6B9E6B, var(--wood)); }
.f-fire { background:linear-gradient(90deg, #D4786E, #E8958A); }
.f-earth { background:linear-gradient(90deg, #B8955A, var(--earth)); }
.f-water { background:linear-gradient(90deg, #5A8EAA, var(--water)); }
.wx-count { width:20px; font-size:0.82rem; text-align:right; color:var(--text2); }

/* Major cards */
.major-card { background:var(--card2); border-radius:10px; padding:16px; margin-bottom:8px; border-left:4px solid var(--gold); display:flex; justify-content:space-between; align-items:flex-start; gap:12px; transition:all 0.2s; cursor:default; }
.major-card:hover { transform:translateX(4px); }
.major-card.benke { border-left-color:var(--gold); }
.major-card.zhuanke { border-left-color:var(--water); }
.major-info { flex:1; }
.major-name { font-size:1.02rem; font-weight:600; }
.major-meta { font-size:0.78rem; color:var(--text2); margin-top:2px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.major-reason { font-size:0.82rem; color:var(--text2); margin-top:4px; line-height:1.5; }
.major-stars { white-space:nowrap; font-size:1rem; }

/* Score badge */
.score-badge { font-size:0.8rem; padding:2px 8px; border-radius:999px; font-weight:600; }
.score-high { background:rgba(201,169,110,0.2); color:var(--gold); }
.score-mid { background:rgba(123,168,127,0.2); color:var(--wood); }
.score-ok { background:rgba(107,158,191,0.2); color:var(--water); }

/* Tabs */
.tabs { display:flex; gap:4px; margin-bottom:14px; flex-wrap:wrap; }
.tab { padding:8px 18px; background:var(--card2); border:1px solid var(--border); border-radius:999px; cursor:pointer; font-size:0.85rem; color:var(--text2); transition:all 0.2s; font-family:inherit; }
.tab.active { background:var(--gold); color:#1a1a1a; border-color:var(--gold); }
.tab:hover:not(.active) { border-color:var(--gold); }
.tab-content { display:none; }
.tab-content.active { display:block; }

#resultSection { display:none; }

.disclaimer { background:rgba(201,169,110,0.06); border:1px solid rgba(201,169,110,0.15); border-radius:8px; padding:12px 16px; font-size:0.78rem; color:var(--text2); margin-top:20px; text-align:center; }

.advice-box { background:rgba(201,169,110,0.05); border-left:3px solid var(--gold); padding:12px 16px; border-radius:0 8px 8px 0; margin:8px 0; font-size:0.88rem; }
.advice-box.warn { border-left-color:var(--fire); background:rgba(212,120,110,0.05); }

.copy-area { background:var(--card2); border:1px dashed var(--border); border-radius:8px; padding:16px; margin-top:12px; font-family:monospace; font-size:0.82rem; white-space:pre-wrap; max-height:260px; overflow-y:auto; color:var(--text2); }

/* Browse table */
.major-table { width:100%; border-collapse:collapse; font-size:0.85rem; margin-top:12px; }
.major-table th { text-align:left; padding:10px 12px; border-bottom:2px solid var(--border); font-size:0.8rem; color:var(--text2); cursor:pointer; user-select:none; }
.major-table th:hover { color:var(--gold); }
.major-table td { padding:8px 12px; border-bottom:1px solid var(--border); }
.major-table tr:hover td { background:rgba(255,255,255,0.02); }
.major-table .sort-arrow { font-size:0.7rem; margin-left:4px; }

.filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.filter-btn { padding:6px 14px; border-radius:999px; border:1px solid var(--border); background:var(--card2); color:var(--text2); cursor:pointer; font-size:0.82rem; font-family:inherit; transition:all 0.2s; }
.filter-btn:hover, .filter-btn.active { border-color:var(--gold); color:var(--gold); }
.search-input { background:var(--card2); border:1px solid var(--border); border-radius:8px; padding:8px 14px; color:var(--text); font-size:0.85rem; font-family:inherit; flex:1; min-width:180px; }
.search-input:focus { outline:none; border-color:var(--gold); }

/* Print */
@media print {
  body { background:#fff; color:#222; }
  .card { background:#fff; border:1px solid #ddd; box-shadow:none; break-inside:avoid; }
  .btn, .tabs, .filter-bar, #inputCard, .header { display:none !important; }
  #resultSection { display:block !important; }
  .major-card { border-left-width:2px; }
  .disclaimer { background:#fffbe6; }
}

/* Toast */
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--gold); color:#1a1a1a; padding:10px 24px; border-radius:999px; font-size:0.9rem; font-weight:500; z-index:999; opacity:0; transition:opacity 0.3s; pointer-events:none; }
.toast.show { opacity:1; }

/* Animations */
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.card { animation:fadeIn 0.4s ease; }

/* Responsive */
@media (max-width:600px) {
  .header h1 { font-size:1.3rem; }
  .pillars { grid-template-columns:repeat(2, 1fr); }
  .form-row { grid-template-columns:1fr; }
  .major-card { flex-direction:column; }
  .major-stars { align-self:flex-end; }
}

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.stats-row { display:flex; gap:12px; flex-wrap:wrap; margin:16px 0; }
.stat-item { background:var(--card2); border-radius:8px; padding:10px 16px; text-align:center; flex:1; min-width:80px; }
.stat-num { font-size:1.3rem; font-weight:700; }
.stat-label { font-size:0.72rem; color:var(--text2); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🔮 八字专业匹配</h1>
    <div class="subtitle">
      <span>八字命理学 × 高校专业目录</span>
      <span class="badge">高考志愿填报</span>
      <span class="badge">本专科覆盖</span>
    </div>
  </div>

  <!-- ============ INPUT ============ -->
  <div class="card" id="inputCard">
    <h2><span class="icon">📝</span> 输入出生信息</h2>
    <div class="form-row">
      <div class="form-group"><label>出生日期</label><input type="date" id="birthDate" value="2005-06-15"></div>
      <div class="form-group"><label>日历类型</label><select id="calType"><option value="solar">公历（阳历）</option><option value="lunar">农历（阴历）— 近似换算</option></select></div>
      <div class="form-group"><label>出生时辰</label><select id="birthTime"></select></div>
      <div class="form-group"><label>性别</label><select id="gender"><option value="male">男</option><option value="female" selected>女</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>高考分数（可选）</label><input type="number" id="score" placeholder="如：560" min="0" max="750"></div>
      <div class="form-group"><label>省份</label><select id="province"><option value="">不限</option></select></div>
      <div class="form-group"><label>意向地区</label><select id="preferRegion"><option value="">不限</option></select></div>
      <div class="form-group"><label>意向专业门类</label><select id="preferCategory"><option value="">不限</option></select></div>
    </div>
    <button class="btn btn-primary" onclick="analyze()">🔍 开始分析</button>
  </div>

  <!-- ============ RESULT ============ -->
  <div id="resultSection">
    <div class="card" id="baziCard">
      <h2><span class="icon">📅</span> 八字排盘结果</h2>
      <div class="pillars" id="pillarsContainer"></div>
      <div class="analysis-grid" id="analysisGrid"></div>
      <div class="wuxing-bars" id="wuxingBars"></div>
    </div>

    <div class="card" id="pathCard">
      <h2><span class="icon">🎓</span> 学历路径与天赋分析</h2>
      <div id="pathContent"></div>
    </div>

    <div class="card">
      <h2><span class="icon">📚</span> 推荐结果</h2>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('benke')">🎓 本科推荐</button>
        <button class="tab" onclick="switchTab('zhuanke')">🔧 专科推荐</button>
        <button class="tab" onclick="switchTab('strategy')">🎯 志愿策略</button>
        <button class="tab" onclick="switchTab('browse')">📖 专业浏览</button>
        <button class="tab" onclick="switchTab('schools')">🏫 院校推荐</button>
        <button class="tab" onclick="switchTab('claude')">🤖 Claude 深度</button>
      </div>
      <div class="tab-content active" id="tab-benke"></div>
      <div class="tab-content" id="tab-zhuanke"></div>
      <div class="tab-content" id="tab-strategy"></div>
      <div class="tab-content" id="tab-browse"></div>
      <div class="tab-content" id="tab-schools"></div>
      <div class="tab-content" id="tab-claude"></div>
    </div>

    <div class="card" id="warnCard">
      <h2><span class="icon">⚠️</span> 谨慎选择的方向</h2>
      <div id="warnContent"></div>
    </div>

    <div class="disclaimer">
      ⚠️ 本工具仅供娱乐参考。八字命理学是传统文化的一部分，不应作为升学决策的唯一依据。专业选择请结合个人兴趣、高考分数、院校实力、就业前景等实际情况综合考量。
    </div>

    <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;">
      <button class="btn btn-secondary" onclick="window.print()" style="flex:1;min-width:140px;">🖨 打印结果</button>
      <button class="btn btn-secondary" onclick="resetForm()" style="flex:1;min-width:140px;">↩ 重新输入</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

// ============================================================
//  BA ZI ENGINE
// ============================================================
function yearPillar(date) {
  const y = date.getFullYear();
  const isBeforeLC = (date.getMonth() < 1) || (date.getMonth() === 1 && date.getDate() < 4);
  const ey = isBeforeLC ? y - 1 : y;
  const si = ((ey - 4) % 10 + 10) % 10;
  const bi = ((ey - 4) % 12 + 12) % 12;
  return { stem:STEMS[si], branch:BRANCHES[bi], zodiac:ZODIAC[bi], year:ey };
}

function monthPillar(date) {
  const m = date.getMonth(), d = date.getDate();
  const jqDays = [6,4,6,5,6,6,7,8,8,8,7,7];
  let mn; // 寅=1
  if (m === 0) mn = (d >= jqDays[0]) ? 12 : 11;
  else if (m < 11) mn = (d >= jqDays[m]) ? m + 1 : m;
  else mn = (d >= jqDays[11]) ? 12 : 11;
  mn = ((mn - 1 + 12) % 12);
  const branch = BRANCHES[mn];
  const yp = yearPillar(date);
  const ysi = STEMS.indexOf(yp.stem);
  const base = [2,4,6,8,0][Math.floor(ysi / 2) % 5];
  const stem = STEMS[(base + mn) % 10];
  return { stem, branch };
}

function dayPillar(date) {
  const y = date.getFullYear(), m = date.getMonth() + 1, d = date.getDate();
  const a = Math.floor((14 - m) / 12);
  const yr = y + 4800 - a;
  const mo = m + 12 * a - 3;
  const jdn = d + Math.floor((153 * mo + 2) / 5) + 365 * yr + Math.floor(yr / 4) - Math.floor(yr / 100) + Math.floor(yr / 400) - 32045;
  // 1900-01-01 JDN=2415021, index 10 (甲戌)
  const idx = ((jdn - 2415021 + 10) % 60 + 60) % 60;
  return { stem:STEMS[idx % 10], branch:BRANCHES[idx % 12], idx };
}

function hourPillar(dayStem, hIdx) {
  const branch = BRANCHES[hIdx];
  const base = WSD[dayStem];
  const stem = STEMS[(base + hIdx) % 10];
  return { stem, branch };
}

function wuxingCounts(stems, branches) {
  const c = { '金':0,'木':0,'水':0,'火':0,'土':0 };
  stems.forEach(s => { if (WX[s]) c[WX[s]]++; });
  branches.forEach(b => { (HIDDEN[b]||[]).forEach(h => { if (WX[h]) c[WX[h]]++; }); });
  return c;
}

function judgeStrength(dayWx, monthBr, wc) {
  const mWx = WX_BR[monthBr];
  let score = 0;
  if (mWx === dayWx) score += 3;
  else if (SHENG[mWx] === dayWx) score += 1;
  else if (SHENG[dayWx] === mWx) score -= 2;
  else if (KE[dayWx] === mWx) score -= 1;
  else score -= 3;
  const sup = (wc[dayWx]||0) + (wc[Object.keys(SHENG).find(k => SHENG[k]===dayWx)||'']||0);
  if (sup >= 5) score += 2; else if (sup >= 3) score += 1; else if (sup <= 1) score -= 1;
  if (score >= 4) return '极强'; if (score >= 2) return '偏强'; if (score >= -1) return '中和'; if (score >= -3) return '偏弱';
  return '极弱';
}

function yongJi(dayWx, strength, monthBr) {
  const all = ['金','木','水','火','土'];
  let yong = [], ji = [], reason = '';
  if (strength === '极强') {
    yong = [KE[dayWx], SHENG[dayWx]].filter(Boolean);
    ji = [dayWx, ...all.filter(w => SHENG[w] === dayWx)];
    reason = '身强需克泄耗';
  } else if (strength === '偏强') {
    yong = [KE[dayWx], SHENG[dayWx]].filter(Boolean);
    ji = [dayWx, ...all.filter(w => SHENG[w] === dayWx)];
    reason = '身偏强，以克泄为主';
  } else if (strength === '偏弱') {
    yong = [dayWx, ...all.filter(w => SHENG[w] === dayWx)];
    ji = [KE[dayWx], SHENG[dayWx]].filter(Boolean);
    reason = '身偏弱，以生扶为主';
  } else if (strength === '极弱') {
    yong = [dayWx, ...all.filter(w => SHENG[w] === dayWx)];
    ji = [KE[dayWx], SHENG[dayWx]].filter(Boolean);
    reason = '身极弱需生扶，或从格';
  } else {
    yong = [...all]; ji = []; reason = '中和，通关调和为主';
  }
  yong = [...new Set(yong)]; ji = [...new Set(ji)];
  // 调候
  const summer = ['巳','午','未'], winter = ['亥','子','丑'];
  if (summer.includes(monthBr) && !yong.includes('水')) { yong.unshift('水'); reason += '；夏月需水调候'; }
  if (winter.includes(monthBr) && !yong.includes('火')) { yong.unshift('火'); reason += '；冬月需火暖局'; }
  return { yong, ji, reason };
}

function shiShen(dayStem, otherStem) {
  const di = STEMS.indexOf(dayStem), oi = STEMS.indexOf(otherStem);
  const diff = (oi - di + 10) % 10;
  const sameYY = YY[dayStem] === YY[otherStem];
  const dw = WX[dayStem], ow = WX[otherStem];
  if (dw === ow) return sameYY ? '比肩' : '劫财';
  if (SHENG[ow] === dw) return sameYY ? '偏印' : '正印';
  if (SHENG[dw] === ow) return sameYY ? '食神' : '伤官';
  if (KE[ow] === dw) return sameYY ? '七杀' : '正官';
  if (KE[dw] === ow) return sameYY ? '偏财' : '正财';
  return '—';
}

// ============================================================
//  MATCHING ENGINE
// ============================================================
function matchMajors(yongWx, dayStem, strength, pattern, preferCat, isBenke) {
  const level = isBenke ? '本科' : '专科';
  const pool = MAJORS.filter(m => m.l === level);
  if (preferCat) {
    const cat = CATEGORIES.find(c => c.v === preferCat);
    if (cat) {
      const catPool = pool.filter(m => m.c === cat.n);
      if (catPool.length >= 3) return scoreAndRank(catPool, yongWx, dayStem, pattern, 6);
    }
  }
  return scoreAndRank(pool, yongWx, dayStem, pattern, 7);
}

function scoreAndRank(pool, yongWx, dayStem, pattern, limit) {
  const scored = pool.map(m => {
    let s = 50;
    // 喜用神匹配 (40%)
    if (yongWx.some(wx => m.w.includes(wx))) s += 38;
    else if (yongWx.some(wx => SHENG[wx] && m.w.includes(SHENG[wx]))) s += 18;
    // 格局匹配 (25%)
    if ((pattern.includes('正官')||pattern.includes('七杀')) && ['法学','公安司法','经济学'].includes(m.c)) s += 23;
    if (pattern.includes('正印') && ['教育学','文学','历史学'].includes(m.c)) s += 23;
    if (pattern.includes('偏印') && ['理学','哲学','医学'].includes(m.c)) s += 20;
    if ((pattern.includes('食神')||pattern.includes('伤官')) && ['艺术学','文化艺术','工学','电子信息'].includes(m.c)) s += 23;
    if ((pattern.includes('正财')||pattern.includes('偏财')) && ['经济学','管理学','财经商贸'].includes(m.c)) s += 23;
    if ((pattern.includes('比肩')||pattern.includes('劫财')) && ['管理学','工学'].includes(m.c)) s += 18;
    // 热度分 (10%)
    s += (m.h || 3) * 2;
    // Random jitter for variety
    s += (m.n.charCodeAt(0) % 7) - 3;
    return { ...m, score: Math.min(98, s) };
  });
  scored.sort((a,b) => b.score - a.score);
  // 去重 (同专业名)
  const seen = new Set();
  const result = [];
  for (const m of scored) {
    if (!seen.has(m.n) && result.length < limit) { seen.add(m.n); result.push(m); }
  }
  return result;
}

function getStars(score) {
  if (score >= 90) return 5;
  if (score >= 80) return 4;
  if (score >= 70) return 3;
  if (score >= 60) return 2;
  return 1;
}

function analyze() {
  try {
  const dateVal = document.getElementById('birthDate').value;
  const calType = document.getElementById('calType').value;
  const birthIdx = parseInt(document.getElementById('birthTime').value);
  const gender = document.getElementById('gender').value;
  const scoreVal = document.getElementById('score').value;
  const province = document.getElementById('province').value;
  const preferRegion = document.getElementById('preferRegion').value;
  const preferCategory = document.getElementById('preferCategory').value;

  if (!dateVal) { toast('请选择出生日期'); return; }

  let date = new Date(dateVal + 'T12:00:00');
  if (calType === 'lunar') date.setMonth(date.getMonth() + 1);

  // 1. 排盘
  const yp = yearPillar(date);
  const mp = monthPillar(date);
  const dp = dayPillar(date);
  const hp = hourPillar(dp.stem, birthIdx);

  const allStems = [yp.stem, mp.stem, dp.stem, hp.stem];
  const allBranches = [yp.branch, mp.branch, dp.branch, hp.branch];

  // 2. 五行分析
  const wc = wuxingCounts(allStems, allBranches);
  const dayWx = WX[dp.stem];
  const strength = judgeStrength(dayWx, mp.branch, wc);
  const yj = yongJi(dayWx, strength, mp.branch);

  // 3. 十神格局
  const ss = allStems.map(s => shiShen(dp.stem, s));
  const ssc = {}; ss.forEach(s => { ssc[s] = (ssc[s]||0)+1; });
  const topSS = Object.entries(ssc).filter(([k]) => k !== '—').sort((a,b) => b[1]-a[1]).slice(0,3);
  const pattern = topSS.map(([k]) => k).join('+') || '中和';

  // 4. 日柱特质
  const dayTraits = {
    '甲':'领导型·管理/教育','乙':'柔韧型·文学/心理','丙':'热情型·表演/科技','丁':'内热型·研发/设计',
    '戊':'厚重型·建筑/金融','己':'细腻型·会计/护理','庚':'刚毅型·法务/外科','辛':'精致型·编程/仪器',
    '壬':'大气型·外交/海洋','癸':'深邃型·哲学/密码'
  };

  // 5. 匹配
  const benkeMajors = matchMajors(yj.yong, dp.stem, strength, pattern, preferCategory, true);
  const zhuankeMajors = matchMajors(yj.yong, dp.stem, strength, pattern, preferCategory, false);

  // 5.5 院校匹配（需要分数+省份）
  const uniResults = (scoreVal && province) ? matchUniversities(parseInt(scoreVal), province, benkeMajors, zhuankeMajors, yj.yong, preferRegion) : null;

  // 6. 忌神专业
  const jiMajors = [];
  yj.ji.forEach(wx => {
    MAJORS.filter(m => m.w === wx && m.l === '本科').slice(0,2).forEach(m => {
      if (!jiMajors.find(j => j.n === m.n)) jiMajors.push(m);
    });
  });

  // 7. 路径建议
  let pathInfo = {};
  if (pattern.includes('正印') || pattern.includes('正官')) {
    pathInfo = { n:'学术型 · 优先本科', d:'印/官旺相，学术研究能力强，建议优先报考本科院校，后续可考研深造。', c:'gold' };
  } else if (pattern.includes('伤官') && pattern.includes('正印')) {
    pathInfo = { n:'学术+技能型 · 本科优先', d:'伤官配印格局，才华与学识兼备，建议本科走技术与理论结合的专业。', c:'wood' };
  } else if (pattern.includes('食神') || pattern.includes('伤官')) {
    pathInfo = { n:'技能型 · 本专科皆可', d:'食伤主才华技术，专业匹配度优先于学历层次。技术应用型本科或优质专科均可，后期可专升本。', c:'wood' };
  } else if (pattern.includes('正财') || pattern.includes('偏财')) {
    pathInfo = { n:'应用型 · 本科为主', d:'财星格局务实重应用，建议选择应用型本科或行业特色院校，专业对口度影响就业收入。', c:'earth' };
  } else {
    pathInfo = { n:'综合型 · 本科优先', d:'格局中和，适应力强，建议优先本科，大类招生入校后分流。', c:'water' };
  }

  render({ yp,mp,dp,hp,wc,dayWx,strength,yj,pattern,topSS,
    dayTraits,benkeMajors,zhuankeMajors,jiMajors,pathInfo,date,gender,scoreVal,province,preferRegion,preferCategory,uniResults });

  document.getElementById('resultSection').style.display = 'block';
  document.getElementById('inputCard').style.display = 'none';
  document.getElementById('resultSection').scrollIntoView({ behavior:'smooth' });
  } catch(e) { alert('分析出错: ' + e.message); console.error(e); }
}

    { l:'日柱', s:dp.stem, b:dp.branch, h:HIDDEN[dp.branch]||[] },
    { l:'时柱', s:hp.stem, b:hp.branch, h:HIDDEN[hp.branch]||[] }
  ];

    const wx = WX[p.s];

      <div class="pillar-label">${p.l}</div>
      <div class="pillar-stem"><span class="tag ${cls}">${p.s}</span></div>
      <div class="pillar-branch">${p.b}</div>
      <div class="pillar-hidden">藏: ${(p.h||[]).join('')}</div>
    </div>`;
  });
  document.getElementById('pillarsContainer').innerHTML = pH;

  document.getElementById('analysisGrid').innerHTML = `
    <div class="analysis-item"><div class="label">日主</div><div class="value">${dp.stem} (${dayWx}·${YY[dp.stem]})</div></div>
    <div class="analysis-item"><div class="label">强弱</div><div class="value">${strength}</div></div>
    <div class="analysis-item"><div class="label">喜用神</div><div class="value" style="color:var(--${dayWx==='金'?'gold':dayWx==='木'?'wood':dayWx==='水'?'water':dayWx==='火'?'fire':'earth'})">${yj.yong.join('、')}</div></div>
    <div class="analysis-item"><div class="label">忌神</div><div class="value" style="color:var(--text2)">${yj.ji.length ? yj.ji.join('、') : '无'}</div></div>
    <div class="analysis-item"><div class="label">十神格局</div><div class="value">${pattern}</div></div>
    <div class="analysis-item"><div class="label">生肖</div><div class="value">${yp.zodiac}</div></div>
  `;

  const maxC = Math.max(...Object.values(wc), 1);
  let wbH = '';
  ['金','木','水','火','土'].forEach(wx => {
    const pct = Math.round(wc[wx]/maxC*100);
    const cf = `f-${wx==='金'?'gold':wx==='木'?'wood':wx==='水'?'water':wx==='火'?'fire':'earth'}`;
    wbH += `<div class="wx-row"><div class="wx-label">${wx}</div><div class="wx-bar"><div class="wx-fill ${cf}" style="width:${pct}%"></div></div><div class="wx-count">${wc[wx]}</div></div>`;
  });
  document.getElementById('wuxingBars').innerHTML = wbH;

  document.getElementById('pathContent').innerHTML = `
    <div style="font-size:1.1rem;font-weight:600;margin-bottom:6px;">🎯 ${pathInfo.n}</div>
    <div style="color:var(--text2);">${pathInfo.d}</div>
    <div style="margin-top:10px;font-size:0.82rem;color:var(--text2);">基础：日主${strength} · ${pattern} · 喜${yj.yong.join('、')} · ${yj.reason}</div>
    <div style="margin-top:6px;font-size:0.82rem;color:var(--gold-light);">🧬 日柱特质：${dayTraits[dp.stem] || '综合型'}</div>
  `;

  document.getElementById('tab-benke').innerHTML = renderCards(benkeMajors,'benke');
  document.getElementById('tab-zhuanke').innerHTML = renderCards(zhuankeMajors,'zhuanke');
  document.getElementById('tab-strategy').innerHTML = renderStrategy(d);
  document.getElementById('tab-schools').innerHTML = renderUniversities(uniResults);
  document.getElementById('tab-claude').innerHTML = renderClaudePrompt(d);
  resetTabs();

  let warnH = '<p style="color:var(--text2);margin-bottom:10px;">以下方向对应忌神五行（'+yj.ji.join('、')+'），建议谨慎选择：</p>';
  if (jiMajors.length) {
    jiMajors.slice(0,4).forEach(m => {
      warnH += `<div class="advice-box warn">🚫 <strong>${m.n}</strong>（${m.c}·${m.w}）— 忌神方向，学习过程可能较为吃力</div>`;
    });
  } else {
    warnH += '<p style="color:var(--text2);">未检测到强烈忌讳方向，但建议回避与忌神五行高度相关的专业。</p>';
  }
  document.getElementById('warnContent').innerHTML = warnH;
}

function renderCards(majors, type) {
  if (!majors.length) return '<p style="color:var(--text2);">暂无匹配结果，请尝试调整筛选条件</p>';
  return majors.map(m => {
    const stars = getStars(m.score);
    const sText = '⭐'.repeat(stars) + (stars < 5 ? '☆'.repeat(5-stars) : '');
    const scCls = stars >= 5 ? 'score-high' : stars >= 4 ? 'score-mid' : 'score-ok';
    const wxCls = `tg-${(m.w||'土').includes('金')?'gold':(m.w||'').includes('木')?'wood':(m.w||'').includes('水')?'water':(m.w||'').includes('火')?'fire':'earth'}`;
    return `<div class="major-card ${type}">
      <div class="major-info">
        <div class="major-name">${m.n} <span class="tag ${wxCls}">${m.w}</span></div>
        <div class="major-meta"><span>${m.c}</span><span>·</span><span>${m.l}</span><span class="score-badge ${scCls}">${m.score}分</span></div>
        <div class="major-reason">${m.r}</div>
      </div>
      <div class="major-stars">${sText}</div>
    </div>`;
  }).join('');
}

  const { yj, pattern, strength, preferRegion, scoreVal } = d;
  const yongWx = yj.yong[0];

  if (region) {
    const match = region.wx === yongWx ? '✅ 与喜用神一致' : (yj.ji.includes(region.wx) ? '⚠️ 与忌神重叠，建议慎重' : '➖ 中性');
    rAdvice = `<div class="advice-box">📍 ${region.n}：${region.desc} ${match}</div>`;

    '建议 <b>专业与学校平衡</b> — 选择大类招生院校，入校后再分流';

  return `
    <h3>🎯 八字视角的志愿策略</h3>
    <div class="advice-box"><strong>冲：</strong>喜用神 <b>${yongWx}</b> 对应的专业可适当冲刺更高层次院校<br>

    <div class="advice-box"><strong>📊 专业vs学校：</strong>${priorityAdvice}</div>
    ${scoreVal ? `<div class="advice-box"><strong>📝 分数参考：</strong>结合 <b>${scoreVal}</b> 分和省份排名，筛选匹配专业对应的院校往年录取位次，按冲稳保合理分布。</div>` : ''}
    <div class="stats-row">
      <div class="stat-item"><div class="stat-num">${yj.yong.length}</div><div class="stat-label">喜用神五行</div></div>
      <div class="stat-item"><div class="stat-num">${pattern.split('+').length}</div><div class="stat-label">主导格局</div></div>
      <div class="stat-item"><div class="stat-num">${yj.ji.length||0}</div><div class="stat-label">忌神五行</div></div>
    </div>
    <p style="color:var(--text2);font-size:0.78rem;margin-top:8px;">💡 以上建议基于八字分析。实际填报请结合高考分数排名、院校招生计划和就业趋势综合判断。</p>
  `;
}

// ============================================================
//  UNIVERSITY MATCHING ENGINE
// ============================================================
function matchUniversities(score, province, benkeMajors, zhuankeMajors, yongWx, preferRegion) {
  if (!score || !province) return null;

  const benkeNames = new Set(benkeMajors.map(m => m.n));
  const zhuankeNames = new Set(zhuankeMajors.map(m => m.n));
  const allMajorNames = new Set([...benkeNames, ...zhuankeNames]);

  let pool = UNIVERSITIES.filter(u => u.sc[province] !== undefined);

  // 按用户分数层次筛选：如果分数<本科线附近则也包含专科院校
  if (score < 430) {
    // 主要看专科
    pool = pool.filter(u => u.l === '专科' || (u.l === '本科' && u.sc[province] <= score + 30));
  }

  // Compute match for each university
  const scored = pool.map(u => {
    const cutoff = u.sc[province];
    const gap = score - cutoff;

    // Tier classification
    let tier, tierOrder;
    if (gap >= 20) { tier = '保'; tierOrder = 3; }
    else if (gap >= -15) { tier = '稳'; tierOrder = 2; }
    else if (gap >= -30) { tier = '冲'; tierOrder = 1; }
    else { tier = null; tierOrder = 0; } // out of range

    // Ba Zi cross-match
    let bzScore = 0;
    const bzReasons = [];

    // Check if university's strengths overlap with Ba Zi recommended majors
    const matchedStrengths = u.st.filter(s => allMajorNames.has(s));
    if (matchedStrengths.length >= 3) { bzScore += 25; bzReasons.push('优势专业与八字高度匹配'); }
    else if (matchedStrengths.length >= 1) { bzScore += 15; bzReasons.push('有八字匹配的优势专业'); }

    // University wx matches yongShen
    if (yongWx.includes(u.wx)) { bzScore += 20; bzReasons.push('院校气场('+u.wx+')契合喜用神'); }
    else if (!yongWx.includes(u.wx)) {
      // Check if wx is neutral (not in ji shen either)
      bzScore += 5;
    }

    // Region match
    if (preferRegion && u.r === preferRegion) { bzScore += 10; bzReasons.push('符合意向地区'); }

    // University level bonus
    if (UA_RANK[u.tier] <= 2) bzScore += 8; // 985/211 bonus
    if (UA_RANK[u.tier] <= 3) bzScore += 5;

    // Also include matched majors from Ba Zi that this school offers
    const bzMatchedMajors = (u.l === '本科' ? benkeMajors : zhuankeMajors)
      .filter(m => u.st.includes(m.n))
      .slice(0, 3);

    return {
      ...u,
      cutoff, gap, tier, tierOrder,
      bzScore, bzReasons,
      matchedStrengths,
      bzMatchedMajors,
      score
    };
  });

  // Filter out null tier and sort
  const valid = scored.filter(u => u.tier !== null);
  valid.sort((a, b) => {
    // Sort by tier first (冲 < 稳 < 保), then by bzScore within each tier
    if (a.tierOrder !== b.tierOrder) return a.tierOrder - b.tierOrder;
    return b.bzScore - a.bzScore;
  });

  // Group by tier and pick top N
  const chong = valid.filter(u => u.tier === '冲').slice(0, 3);
  const wen = valid.filter(u => u.tier === '稳').slice(0, 5);
  const bao = valid.filter(u => u.tier === '保').slice(0, 3);

  return { chong, wen, bao, province, score };
}

function renderUniversities(data) {
  if (!data) return '<div class="advice-box">📝 请输入<b>高考分数</b>和<b>省份</b>，获取基于分数的院校推荐（分数-院校匹配 + 八字五行交叉筛选）</div>';

  const { chong, wen, bao, province, score } = data;

  if (!chong.length && !wen.length && !bao.length) {
    return '<div class="advice-box warn">未找到匹配的院校。请检查分数和省份是否正确，或尝试放宽筛选条件。</div>';
  }

  const wxCls = (w) => `tg-${(w||'土').includes('金')?'gold':(w||'').includes('木')?'wood':(w||'').includes('水')?'water':(w||'').includes('火')?'fire':'earth'}`;
  const tierCls = (t) => t === '985/双一流' ? 'score-high' : t.includes('211') ? 'score-mid' : 'score-ok';

  function renderGroup(unis, label, icon, color) {
    if (!unis.length) return '';
    let h = `<h3 style="color:var(--${color});margin:16px 0 10px;">${icon} ${label}（${unis.length}所）</h3>`;
    unis.forEach(u => {
      const gapSign = u.gap >= 0 ? '+' : '';
      const gapColor = u.gap >= 0 ? 'var(--wood)' : 'var(--fire)';
      const gapText = u.gap >= 0 ? `高${u.gap}分` : `低${Math.abs(u.gap)}分`;

      h += `<div class="major-card" style="border-left-color:var(--${color});">
        <div class="major-info">
          <div class="major-name">
            ${u.n}
            <span class="tag ${wxCls(u.wx)}">${u.wx}</span>
            <span class="score-badge ${tierCls(u.tier)}">${u.tier}</span>
          </div>
          <div class="major-meta">
            <span>📍 ${u.city}</span><span>·</span><span>${u.t}</span><span>·</span><span>${u.b}</span>
            <span style="color:${gapColor};font-weight:600;"> · 分数线≈${u.cutoff}（${gapSign}${gapText}）</span>
          </div>
          ${u.matchedStrengths.length ? `<div class="major-meta" style="margin-top:4px;">🎯 匹配优势专业：${u.matchedStrengths.slice(0,5).join('、')}</div>` : ''}
          ${u.bzMatchedMajors.length ? `<div class="major-meta" style="margin-top:2px;">🔮 八字推荐+该校开设：${u.bzMatchedMajors.map(m=>m.n).join('、')}</div>` : ''}
          ${u.bzReasons.length ? `<div class="major-reason">✨ ${u.bzReasons.join(' · ')}</div>` : ''}
        </div>
        <div class="major-stars" style="font-size:0.85rem;text-align:right;">
          <div style="color:var(--gold);">八字契合</div>
          <div style="font-weight:700;">${u.bzScore}分</div>
        </div>
      </div>`;
    });
    return h;
  }

  return `
    <div class="advice-box" style="margin-bottom:12px;">
      📊 <b>${score}分</b> · 省份：<b>${province}</b> · 共匹配 <b>${chong.length+wen.length+bao.length}</b> 所院校
      <span style="font-size:0.75rem;color:var(--text2);display:block;margin-top:4px;">⚠️ 分数线为近年综合参考值，非官方精确数据。实际填报请查阅省教育考试院发布的最新数据。</span>
    </div>
    ${renderGroup(chong, '冲刺院校', '🚀', 'fire')}
    ${renderGroup(wen, '稳妥院校', '🎯', 'gold')}
    ${renderGroup(bao, '保底院校', '🛡️', 'wood')}
    <div class="advice-box" style="margin-top:12px;">
      💡 <b>填报提示：</b>冲的院校建议放在前2-3个志愿，稳的院校作为志愿主体（中间位置），保的院校放在最后2-3个确保有学上。八字五行契合度高的院校，入学后学习体验更佳。
    </div>
  `;
}

// ============================================================
//  BROWSE TAB
// ============================================================
let browseFilter = 'all', browseSort = 'wuxing', browseSortDir = 1, browseSearch = '';

function renderBrowseTable() {
  let pool = [...MAJORS];
  if (browseFilter !== 'all') {
    if (browseFilter === 'benke') pool = pool.filter(m => m.l === '本科');
    else if (browseFilter === 'zhuanke') pool = pool.filter(m => m.l === '专科');
    else pool = pool.filter(m => m.w.includes(browseFilter));
  }
  if (browseSearch) {
    const q = browseSearch.toLowerCase();
    pool = pool.filter(m => m.n.toLowerCase().includes(q) || m.c.toLowerCase().includes(q));
  }
  if (browseSort === 'name') pool.sort((a,b) => browseSortDir * a.n.localeCompare(b.n,'zh'));
  else if (browseSort === 'score') pool.sort((a,b) => browseSortDir * ((b.h||3) - (a.h||3)));
  else if (browseSort === 'wuxing') pool.sort((a,b) => browseSortDir * (a.w||'').localeCompare(b.w||''));
  else if (browseSort === 'category') pool.sort((a,b) => browseSortDir * a.c.localeCompare(b.c,'zh'));

  const wxCls = (w) => `tg-${(w||'土').includes('金')?'gold':(w||'').includes('木')?'wood':(w||'').includes('水')?'water':(w||'').includes('火')?'fire':'earth'}`;

  let h = `<div class="filter-bar">
    <button class="filter-btn ${browseFilter==='all'?'active':''}" onclick="setBrowseFilter('all')">全部</button>
    <button class="filter-btn ${browseFilter==='benke'?'active':''}" onclick="setBrowseFilter('benke')">本科</button>
    <button class="filter-btn ${browseFilter==='zhuanke'?'active':''}" onclick="setBrowseFilter('zhuanke')">专科</button>
    <button class="filter-btn ${browseFilter==='金'?'active':''}" onclick="setBrowseFilter('金')">金</button>
    <button class="filter-btn ${browseFilter==='木'?'active':''}" onclick="setBrowseFilter('木')">木</button>
    <button class="filter-btn ${browseFilter==='水'?'active':''}" onclick="setBrowseFilter('水')">水</button>
    <button class="filter-btn ${browseFilter==='火'?'active':''}" onclick="setBrowseFilter('火')">火</button>
    <button class="filter-btn ${browseFilter==='土'?'active':''}" onclick="setBrowseFilter('土')">土</button>
    <input class="search-input" type="text" placeholder="🔍 搜索专业名称..." value="${browseSearch}" oninput="setBrowseSearch(this.value)">
  </div>`;

  h += `<p style="font-size:0.78rem;color:var(--text2);margin-bottom:8px;">共 ${pool.length} 个专业</p>`;
  h += `<table class="major-table"><thead><tr>
    <th onclick="toggleBrowseSort('name')">专业名称 <span class="sort-arrow">${browseSort==='name'?(browseSortDir>0?'▲':'▼'):''}</span></th>
    <th onclick="toggleBrowseSort('category')">学科门类 <span class="sort-arrow">${browseSort==='category'?(browseSortDir>0?'▲':'▼'):''}</span></th>
    <th onclick="toggleBrowseSort('wuxing')">五行 <span class="sort-arrow">${browseSort==='wuxing'?(browseSortDir>0?'▲':'▼'):''}</span></th>
    <th>层次</th>
    <th onclick="toggleBrowseSort('score')">热度 <span class="sort-arrow">${browseSort==='score'?(browseSortDir>0?'▲':'▼'):''}</span></th>
  </tr></thead><tbody>`;

  pool.forEach(m => {
    h += `<tr>
      <td style="font-weight:500;">${m.n}</td>
      <td>${m.c}</td>
      <td><span class="tag ${wxCls(m.w)}">${m.w}</span></td>
      <td>${m.l}</td>
      <td>${'🔥'.repeat(m.h||3)}</td>
    </tr>`;
  });
  h += '</tbody></table>';
  document.getElementById('tab-browse').innerHTML = h;
}

function setBrowseFilter(f) { browseFilter = f; renderBrowseTable(); }
function setBrowseSearch(q) { browseSearch = q; renderBrowseTable(); }
function toggleBrowseSort(field) {
  if (browseSort === field) browseSortDir *= -1; else { browseSort = field; browseSortDir = -1; }
  renderBrowseTable();
}

// ============================================================
//  HELPERS
// ============================================================
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const tab = document.querySelector(`.tab[onclick="switchTab('${name}')"]`);
  if (tab) tab.classList.add('active');
  const content = document.getElementById(`tab-${name}`);
  if (content) content.classList.add('active');
  if (name === 'browse') renderBrowseTable();
}

function resetTabs() {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const firstTab = document.querySelector('.tab');
  if (firstTab) firstTab.classList.add('active');
  const bc = document.getElementById('tab-benke');
  if (bc) bc.classList.add('active');
}

function resetForm() {
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('inputCard').style.display = 'block';
  window.scrollTo({ top:0, behavior:'smooth' });
}

function copyPrompt() {
  const text = document.getElementById('claudePrompt').innerText;
  navigator.clipboard.writeText(text).then(() => toast('✅ 已复制到剪贴板！'));
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

document.getElementById('birthDate').addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });

// Pre-render browse on page load
window.addEventListener('DOMContentLoaded', () => { try { renderBrowseTable(); } catch(e) {} });
